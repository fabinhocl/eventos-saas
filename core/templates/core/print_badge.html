<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Etiqueta</title><style>@page{size:100mm 35mm;margin:0}body{margin:0;font-family:Arial,sans-serif}.badge{width:100mm;height:35mm;box-sizing:border-box;padding:4mm;display:grid;grid-template-columns:1fr 24mm;gap:3mm;align-items:center;border:1px solid #000}.name{font-size:18px;font-weight:700;line-height:1.1}.meta{font-size:10px;color:#444;line-height:1.3}.event{font-size:11px;font-weight:700;margin-top:2mm}.hint{font-size:8px;color:#666;margin-top:1mm}.qr img{width:22mm;height:22mm;object-fit:contain}</style></head><body onload="window.print()"><div class="badge"><div><div class="name">{{ registration.participant.name }}</div><div class="meta">{{ registration.participant.company }}</div><div class="meta">{{ registration.participant.role }}</div><div class="meta">{{ registration.participant.phone }} · {{ registration.participant.email }}</div><div class="event">{{ registration.event.title }}</div><div class="hint">QR configurado para: {{ qr_mode_label }}.</div></div><div class="qr"><img src="{{ qr_code }}" alt="QR Code do crachá"></div></div></body></html>
