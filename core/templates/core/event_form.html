<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Evento</title><style>body{font-family:Arial,sans-serif;background:#f5f3ee;padding:24px}.wrap{max-width:980px;margin:0 auto}.card{background:#fff;border:1px solid #ddd;border-radius:16px;padding:24px;margin-bottom:18px}.btn{display:inline-block;padding:12px 16px;border:none;border-radius:999px;background:#0d6c73;color:#fff;text-decoration:none;cursor:pointer}.btn-secondary{background:#dcefed;color:#18474b}.actions{display:flex;gap:10px;flex-wrap:wrap}input,textarea,select{width:100%;padding:10px 12px;border:1px solid #bbb;border-radius:8px;box-sizing:border-box}label{font-weight:700}.help{color:#666;font-size:14px}</style></head><body><div class="wrap"><div class="card"><h1>{% if mode == 'create' %}Criar evento{% else %}Editar evento{% endif %}</h1><p class="help">Agora você pode usar URL ou enviar arquivo do banner e da logo.</p><form method="post" enctype="multipart/form-data">{% csrf_token %}{{ form.as_p }}<div class="actions"><button class="btn" type="submit">Salvar evento</button><a class="btn btn-secondary" href="{% url 'dashboard' %}">Voltar</a></div></form></div></div></body></html>
